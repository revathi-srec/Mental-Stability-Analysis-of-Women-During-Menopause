<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | MindCare Analytics</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body class="login-page">

<div class="login-box">
    <h2>Welcome!!!</h2>
    <p>Login to continue your assessment</p>

    <form method="POST">
        <input type="text" name="username" class="input-field" placeholder="Enter Username" required>
        <input type="password" name="password" class="input-field" placeholder="Enter Password" required>
        <button class="login-btn" type="submit">Login</button>
    </form>

    <div class="alt-text">
        <a href="{{ url_for('home') }}">Continue without login</a>
    </div>
</div>

</body>
</html>
