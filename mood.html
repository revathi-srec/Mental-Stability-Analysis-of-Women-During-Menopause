<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mood Tracker</title>

<style>

body {
    font-family: Arial;
    background: linear-gradient(to right, #e0f7f6, #ffffff);
}

/* CONTAINER */
.container {
    width: 60%;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

/* TITLE */
h2 {
    text-align: center;
    color: #187c77;
}

/* MOOD BUTTONS */
.moods {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

button {
    font-size: 25px;
    padding: 10px;
    border: none;
    background: #187c77;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #145f5c;
}

/* TABLE */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: center;
}

.chart-box {
    width: 100%;
    height: 300px;
    margin-top: 30px;
}

</style>
</head>

<body>

<div class="container">

<h2>📅 Daily Mood Tracker</h2>

<!-- FORM -->
<form action="/save_mood" method="POST">

<div class="moods">
    <button name="mood" value="Happy">😊</button>
    <button name="mood" value="Neutral">😐</button>
    <button name="mood" value="Sad">😢</button>
</div>

</form>

<!-- TABLE -->
<table>
<tr>
    <th>Date</th>
    <th>Mood</th>
</tr>

{% for m in moods %}
<tr>
    <td>{{ m.date }}</td>
    <td>{{ m.mood }}</td>
</tr>
{% endfor %}

</table>

<!-- GRAPH -->
<div class="chart-box">
    <canvas id="moodChart"></canvas>
</div>

<br>

<a href="/home">
    <button>⬅ Back</button>
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// ✅ SAFE DATA
let moods = JSON.parse('{{ moods | tojson | safe }}' || '[]');

// Labels & values
let labels = moods.map(m => m.date);
let values = moods.map(m => {
    if(m.mood === "Happy") return 3;
    if(m.mood === "Neutral") return 2;
    return 1;
});

// Chart
new Chart(document.getElementById('moodChart'), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: "Mood Trend",
            data: values,
            borderColor: "#187c77",
            fill: false
        }]
    },
    options: {
        scales: {
            y: {
                ticks: {
                    callback: function(value) {
                        if(value == 3) return "😊";
                        if(value == 2) return "😐";
                        if(value == 1) return "😢";
                    },
                    stepSize: 1,
                    min: 1,
                    max: 3
                }
            }
        }
    }
});

</script>

</body>
</html>
